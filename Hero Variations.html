<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Hero Variations — Axel Alvarez</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:ital,wght@0,400;0,500;0,700;0,800;1,400&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="hero-variations.css" />
<style>
  html, body { margin: 0; background: #0a0a0a; font-family: "JetBrains Mono", ui-monospace, monospace; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="hero-variations.jsx"></script>
<script type="text/babel" data-presets="env,react">
  const { DesignCanvas, DCSection, DCArtboard } = window;
  const { HeroA, HeroB, HeroC } = window;

  function App() {
    return (
      <DesignCanvas title="Hero Variations" subtitle="axel_alvarez · 3 directions">
        <DCSection id="heroes" title="Hero Treatments">
          <DCArtboard id="hero-a" label="A · full-bleed name + status" width={1280} height={760}>
            <HeroA />
          </DCArtboard>
          <DCArtboard id="hero-b" label="B · terminal window" width={1280} height={760}>
            <HeroB />
          </DCArtboard>
          <DCArtboard id="hero-c" label="C · sidebar + massive name" width={1280} height={760}>
            <HeroC />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
